# SmartSense Application Configuration

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration - MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/smartsense_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=SmartSense2026SecretKeyForJWTTokenGenerationAndValidation
jwt.expiration=86400000

# File Upload Configuration (for face images)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
logging.level.com.smartsense=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Application Info
spring.application.name=SmartSense
application.version=1.0.0
